<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ein paar Bilder</title>
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        padding: 2rem 1rem;
        background: #d6d0c4;
        font-family: Georgia, serif;
        color: #222;
      }

      .page {
        max-width: 860px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.88);
        border-radius: 6px;
        padding: 2.5rem 3rem;
        box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      }

      h1 {
        font-size: 1.8rem;
        font-weight: normal;
        margin: 0 0 1.5rem;
        border-bottom: 1px solid #ccc;
        padding-bottom: 0.8rem;
      }

      .photo-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.5rem;
      }

      .photo-grid img {
        width: 100%;
        height: 130px;
        object-fit: cover;
        border-radius: 3px;
        display: block;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      .photo-grid img:hover {
        opacity: 0.85;
      }

      /* Lightbox */
      #lightbox {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.92);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }

      #lightbox.open { display: flex; }

      #lightbox img {
        max-width: 92vw;
        max-height: 92vh;
        border-radius: 4px;
        box-shadow: 0 4px 32px rgba(0,0,0,0.6);
      }

      #lightbox-close {
        position: absolute;
        top: 1rem;
        right: 1.4rem;
        color: #fff;
        font-size: 2.2rem;
        line-height: 1;
        cursor: pointer;
        user-select: none;
        opacity: 0.8;
      }

      #lightbox-close:hover { opacity: 1; }

      #lightbox-prev, #lightbox-next {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        color: #fff;
        font-size: 2.5rem;
        cursor: pointer;
        user-select: none;
        padding: 0.5rem 1rem;
        opacity: 0.7;
      }

      #lightbox-prev:hover, #lightbox-next:hover { opacity: 1; }
      #lightbox-prev { left: 0.5rem; }
      #lightbox-next { right: 0.5rem; }

      #lightbox-caption {
        position: absolute;
        bottom: 1.2rem;
        left: 50%;
        transform: translateX(-50%);
        color: #ccc;
        font-size: 0.85rem;
      }

      @media (max-width: 600px) {
        .page { padding: 1.5rem 1.2rem; }
        .photo-grid { grid-template-columns: repeat(3, 1fr); }
        .photo-grid img { height: 100px; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <h1>Ein paar Bilder</h1>
      <div class="photo-grid">
        <img src="images/p1140492.jpg"              data-full="images/p1140492.jpg"              alt="">
        <img src="images/p1140474.jpg"              data-full="images/p1140474.jpg"              alt="">
        <img src="images/1019_49.jpg"               data-full="images/1019_49.jpg"               alt="">
        <img src="images/67.jpg"                    data-full="images/67.jpg"                    alt="">
        <img src="images/01_klaus.jpg"              data-full="images/01_klaus.jpg"              alt="">
        <img src="images/16.jpg"                    data-full="images/16.jpg"                    alt="">
        <img src="images/648_i.jpg"                 data-full="images/648_i.jpg"                 alt="">
        <img src="images/225.jpg"                   data-full="images/225.jpg"                   alt="">
        <img src="images/224_klaus___linda_iiii.jpg" data-full="images/224_klaus___linda_iiii.jpg" alt="">
        <img src="images/100_honor_pupil_ii.jpg"    data-full="images/100_honor_pupil_ii.jpg"    alt="">
        <img src="images/078_klaus_i.jpg"           data-full="images/078_klaus_i.jpg"           alt="">
      </div>
    </div>

    <div id="lightbox">
      <span id="lightbox-close">&times;</span>
      <span id="lightbox-prev">&#8249;</span>
      <img id="lightbox-img" src="" alt="">
      <span id="lightbox-next">&#8250;</span>
      <div id="lightbox-caption"></div>
    </div>

    <script>
      const images = Array.from(document.querySelectorAll('.photo-grid img'));
      const lightbox = document.getElementById('lightbox');
      const lbImg = document.getElementById('lightbox-img');
      const lbCaption = document.getElementById('lightbox-caption');
      let current = 0;

      function open(index) {
        current = index;
        lbImg.src = images[current].dataset.full;
        lbCaption.textContent = (current + 1) + ' / ' + images.length;
        lightbox.classList.add('open');
      }

      function close() {
        lightbox.classList.remove('open');
        lbImg.src = '';
      }

      function navigate(dir) {
        current = (current + dir + images.length) % images.length;
        lbImg.src = images[current].dataset.full;
        lbCaption.textContent = (current + 1) + ' / ' + images.length;
      }

      images.forEach((img, i) => img.addEventListener('click', () => open(i)));
      document.getElementById('lightbox-close').addEventListener('click', close);
      document.getElementById('lightbox-prev').addEventListener('click', () => navigate(-1));
      document.getElementById('lightbox-next').addEventListener('click', () => navigate(1));
      lightbox.addEventListener('click', e => { if (e.target === lightbox) close(); });
      document.addEventListener('keydown', e => {
        if (!lightbox.classList.contains('open')) return;
        if (e.key === 'Escape') close();
        if (e.key === 'ArrowLeft') navigate(-1);
        if (e.key === 'ArrowRight') navigate(1);
      });
    </script>
  </body>
</html>
