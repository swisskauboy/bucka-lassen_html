<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>About Klaus Bucka-Lassen</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; padding: 2rem 1rem; background: #d6d0c4; font-family: Georgia, serif; color: #222; }
      .page { max-width: 860px; margin: 0 auto; background: rgba(255,255,255,0.88); border-radius: 6px; padding: 2.5rem 3rem; box-shadow: 0 2px 12px rgba(0,0,0,0.18); }
      h1 { font-size: 1.8rem; font-weight: normal; margin: 0 0 1.5rem; border-bottom: 1px solid #ccc; padding-bottom: 0.8rem; }
      h2 { font-size: 1.1rem; font-weight: normal; color: #555; margin: 1.5rem 0 0.5rem; }
      p { margin: 0.4rem 0 0.8rem; line-height: 1.6; }
      address { font-style: normal; line-height: 1.8; }
      .content { display: flex; gap: 2rem; align-items: flex-start; }
      .text { flex: 1; }
      .map { flex-shrink: 0; width: 280px; }
      .map iframe { width: 100%; height: 220px; border: 0; border-radius: 4px; }
      .email::before { content: "klaus"; }
      .email::after { content: "@bucka-lassen.dk"; }
      @media (max-width: 600px) { .content { flex-direction: column; } .map { width: 100%; } }
    </style>
  </head>
  <body>
    <div class="page">
      <h1>About Me</h1>
      <div class="content">
        <div class="text">
          <h2>Address</h2>
          <address>
            Klaus Bucka-Lassen<br>
            Reppischtalstrasse 3a<br>
            CH-8903 Birmensdorf<br>
            Switzerland
          </address>

          <h2>Contact</h2>
          <p><span class="email"></span></p>
        </div>
        <div class="map">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d7650.944605485885!2d8.43158831267433!3d47.35695900506183!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47900eb5d62e52cd%3A0xfdc8b15b93146e58!2sReppischtalstrasse%203a%2C%208903%20Birmensdorf!5e1!3m2!1sen!2sch!4v1774727475141!5m2!1sen!2sch"
            allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>
      </div>
    </div>
  </body>
</html>
