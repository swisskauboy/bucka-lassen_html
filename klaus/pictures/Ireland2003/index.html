<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ireland 2003</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; padding: 2rem 1rem; background: #d6d0c4; font-family: Georgia, serif; color: #222; }
      .page { max-width: 860px; margin: 0 auto; background: rgba(255,255,255,0.88); border-radius: 6px; padding: 2.5rem 3rem; box-shadow: 0 2px 12px rgba(0,0,0,0.18); }
      h1 { font-size: 1.8rem; font-weight: normal; margin: 0 0 0.3rem; border-bottom: 1px solid #ccc; padding-bottom: 0.8rem; }
      .subtitle { color: #888; font-size: 0.9rem; margin: 0.4rem 0 1.5rem; }
      .photo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
      .photo-grid img { width: 100%; height: 130px; object-fit: cover; border-radius: 3px; display: block; cursor: pointer; transition: opacity 0.15s; }
      .photo-grid img:hover { opacity: 0.85; }
      #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; align-items: center; justify-content: center; }
      #lightbox.open { display: flex; }
      #lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 4px; box-shadow: 0 4px 32px rgba(0,0,0,0.6); }
      #lightbox-close { position: absolute; top: 1rem; right: 1.4rem; color: #fff; font-size: 2.2rem; line-height: 1; cursor: pointer; user-select: none; opacity: 0.8; }
      #lightbox-close:hover { opacity: 1; }
      #lightbox-prev, #lightbox-next { position: absolute; top: 50%; transform: translateY(-50%); color: #fff; font-size: 2.5rem; cursor: pointer; user-select: none; padding: 0.5rem 1rem; opacity: 0.7; }
      #lightbox-prev:hover, #lightbox-next:hover { opacity: 1; }
      #lightbox-prev { left: 0.5rem; } #lightbox-next { right: 0.5rem; }
      #lightbox-caption { position: absolute; bottom: 1.2rem; left: 50%; transform: translateX(-50%); color: #ccc; font-size: 1.3rem; text-align: center; max-width: 80vw; }
      @media (max-width: 600px) { .page { padding: 1.5rem 1.2rem; } .photo-grid { grid-template-columns: repeat(3, 1fr); } .photo-grid img { height: 100px; } }
    </style>
  </head>
  <body>
    <div class="page">
      <h1>Ireland 2003</h1>
      <p class="subtitle"></p>
      <div class="photo-grid">
        <img src="02 Near Inverin BOII.jpg" alt="Near Inverin">
        <img src="05 BOII.jpg" alt="Worth capturing, we thought">
        <img src="09 BOII.jpg" alt="Clearly a favourite">
        <img src="09 Carrigafoyle Castle BOII.jpg" alt="Carrigafoyle Castle">
        <img src="16 BOIII.jpg" alt="Too good not to keep">
        <img src="16 White does not seem a practical colour in these conditions BOII.jpg" alt="White does not seem a practical colour in these conditions">
        <img src="20-2-BOII.jpg" alt="We rather liked this one">
        <img src="20-BOII.jpg" alt="One of the better shots">
        <img src="21 The Sky Road BOII.jpg" alt="The Sky Road">
        <img src="22 Funny gut feeling-BOII.jpg" alt="Funny gut feeling">
        <img src="22-BOII.jpg" alt="Had to be included">
        <img src="22-BOIII.jpg" alt="A keeper">
        <img src="25 BOII.jpg" alt="Pretty good, we thought">
        <img src="27 It was a steep steep road-BOII.jpg" alt="It was a steep steep road">
        <img src="34 BOII.jpg" alt="Couldn't leave this one out">
        <img src="34 BOIII.jpg" alt="Not a bad shot, really">
        <img src="35 BOII.jpg" alt="Quite pleased with this one">
        <img src="35 BOIII.jpg" alt="Best of the bunch">
        <img src="36 BOII.jpg" alt="A fine bit of Irish scenery">
        <img src="37 BOII.jpg" alt="Speaks for itself">
        <img src="37-BOII.jpg" alt="Hard to improve on nature">
        <img src="38 BOIII.jpg" alt="This one earned its place">
        <img src="40 Impressive fort we had to ourselves BOII.jpg" alt="Impressive fort we had to ourselves">
        <img src="44-BOII.jpg" alt="Couldn't resist">
        <img src="46 View north to Hags Head BOIII.jpg" alt="View north to Hags Head">
        <img src="47-BOIII.jpg" alt="Just look at that">
        <img src="51-BOII.jpg" alt="Worthy of the best-of pile">
        <img src="53 Sunset over Cliffs of Moher-BOII.jpg" alt="Sunset over Cliffs of Moher">
        <img src="55 Local giving dino tracks info BOII.jpg" alt="Local giving dino tracks info">
        <img src="55 O Briens Tower after sunset-BOII.jpg" alt="O'Briens Tower after sunset">
        <img src="55 Or the most challenging ... BOII.jpg" alt="Or the most challenging ...">
        <img src="60 Ballybunion Castle at sunset-BOII.jpg" alt="Ballybunion Castle at sunset">
        <img src="66 BOII.jpg" alt="No caption needed, really">
        <img src="73a-BOII.jpg" alt="Made the cut">
        <img src="96 BOIII.jpg" alt="A solid finish">
      </div>
    </div>
    <div id="lightbox">
      <span id="lightbox-close">&times;</span>
      <span id="lightbox-prev">&#8249;</span>
      <img id="lightbox-img" src="" alt="">
      <span id="lightbox-next">&#8250;</span>
      <div id="lightbox-caption"></div>
    </div>
    <script>
      const images = Array.from(document.querySelectorAll('.photo-grid img'));
      const lightbox = document.getElementById('lightbox');
      const lbImg = document.getElementById('lightbox-img');
      const lbCaption = document.getElementById('lightbox-caption');
      let current = 0;
      function caption(i) { const a = images[i].alt; return a ? a + '  ·  ' + (i+1) + '/' + images.length : (i+1) + ' / ' + images.length; }
      function open(i) { current = i; lbImg.src = images[i].src; lbImg.alt = images[i].alt; lbCaption.textContent = caption(i); lightbox.classList.add('open'); }
      function close() { lightbox.classList.remove('open'); lbImg.src = ''; }
      function navigate(d) { current = (current+d+images.length)%images.length; lbImg.src = images[current].src; lbCaption.textContent = caption(current); }
      images.forEach((img,i) => img.addEventListener('click', () => open(i)));
      document.getElementById('lightbox-close').addEventListener('click', close);
      document.getElementById('lightbox-prev').addEventListener('click', () => navigate(-1));
      document.getElementById('lightbox-next').addEventListener('click', () => navigate(1));
      lightbox.addEventListener('click', e => { if (e.target === lightbox) close(); });
      document.addEventListener('keydown', e => { if (!lightbox.classList.contains('open')) return; if (e.key==='Escape') close(); if (e.key==='ArrowLeft') navigate(-1); if (e.key==='ArrowRight') navigate(1); });
    </script>
  </body>
</html>
